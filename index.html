const setIcons = {

    aegis: 'aegis.png',
    ancestral: 'ancestral.png',

    celestial: 'celestial.png',
    chained: 'chained.png',

    doomed: 'doomed.png',

    eternal: 'eternal.png',

function capitalizeWords(str) {
  return str.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
}

let rows=[];
let sortKey="lvl",asc=true;

function render(){
 let data=[...rows];
 data.sort((a,b)=>{
   let av=a[sortKey],
	   bv=b[sortKey];
   if(sortKey==="qty") {
     // Parse the numeric part from "x/y" format
     const aNum = parseInt(av.split('/')[0]);
     const bNum = parseInt(bv.split('/')[0]);
     return asc ? aNum - bNum : bNum - aNum;
   }
   av=String(av);bv=String(bv);
   return asc?av.localeCompare(bv):bv.localeCompare(av);
 });
 
 let h='<table><tr>';[["name","Set ⇅"],["qty","Qty ⇅"],["lvl","Level ⇅"],["effect","Effect ⇅"]].forEach(c=>{
	 h+=`<th onclick="sortBy('${c[0]}')">${c[1]}</th>`;
 });
 h+='</tr>';

for (const r of data) {
   let nameDisplay = r.name;
   const nameLower = r.name.toLowerCase().replace(' (mythic)', '');
   //Add Regular Icon
   if (r.cls !== 'mythic' && setIcons[nameLower]) {
       nameDisplay = `<img src="icons/${setIcons[nameLower]}" alt="${r.name}" style="width:24px;height:24px;vertical-align:middle;margin-right:8px;">${r.name}`;
   }
   //Add Mythic Icon
   else if (r.cls === 'mythic' && mythicIcons[nameLower]) {
       nameDisplay = `<img src="icons/${mythicIcons[nameLower]}" alt="${r.name}" style="width:24px;height:24px;vertical-align:middle;margin-right:8px;">${r.name}`;
   }
   //Output
   h += `<tr class="${r.cls}"><td>${nameDisplay}</td><td>${r.qty}</td><td>${r.lvl}</td><td>${r.effect}</td></tr>`;
}
 h+='</table>';
 output.innerHTML=h;
}

function sortBy(k){
 if(sortKey===k) asc=!asc;
 else{sortKey=k;asc=true;}
 render();
}

function parse(txt){
 rows=[];
 let active=0,myOwned=0;
 
 // Find all "key": { ... } patterns with quantity inside
 let pos = 0;
 
 while (pos < txt.length) {
   // Find the next quoted key
   const keyMatch = txt.substring(pos).match(/"([^"]+)"\s*:\s*\{/);
   if (!keyMatch) break;
   
   const keyStart = pos + keyMatch.index;
   const key = keyMatch[1];
   const contentStart = keyStart + keyMatch[0].length;
   
   // Find the matching closing brace for this entry
   let braceCount = 1;
   let contentEnd = contentStart;
   let inString = false;
   let escape = false;
   
   while (contentEnd < txt.length && braceCount > 0) {
     const ch = txt[contentEnd];
     
     if (escape) {
       escape = false;
     } else if (ch === '\\') {
       escape = true;
     } else if (ch === '"') {
       inString = !inString;
     } else if (!inString) {
       if (ch === '{') braceCount++;
       else if (ch === '}') braceCount--;
     }
     
     contentEnd++;
   }
   
   // Extract the full entry
   const fullEntry = txt.substring(keyStart, contentEnd);
   pos = contentEnd;
   
   // Look for quantity in this entry
   const qtyMatch = fullEntry.match(/"quantity"\s*:\s*(\d+)/);
   if (qtyMatch) {
     const qty = parseInt(qtyMatch[1]);
     
     if (key.endsWith("_set")) {
       const d = normalSets[key];
       let lvl = "Inactive";
       let effect = "Need more pieces";
       let cls = "inactive";
       let qtyDisplay = String(qty);
       
       if (d) {
         const maxTier = d.tiers[d.tiers.length - 1];
         qtyDisplay = qty + "/" + maxTier;
         
         let reachedTierIndex = -1;
         for (let t = 0; t < d.tiers.length; t++) {
           if (qty >= d.tiers[t]) {
             reachedTierIndex = t;
             effect = d.effects[t];
           }
         }
         
         const totalTiers = d.tiers.length;
         
         if (reachedTierIndex >= 0) {
           lvl = (reachedTierIndex + 1) + "/" + totalTiers;
           cls = (reachedTierIndex === totalTiers - 1) ? "max" : "partial";
           active++;
         } else {
           lvl = "0/" + totalTiers;
           effect = "Need " + d.tiers[0] + " pieces";
           cls = "inactive";
         }
       }
       
       // Capitalize the display name
       const displayName = capitalizeWords(key.replace("_set", ""));
       rows.push({
		  name: displayName, 
		  qty: qtyDisplay, 
		  lvl: lvl, 
		  effect: effect, 
		  cls: cls
		});
     } else if (key.endsWith("_mythic")) {
       if (qty > 0) {
         myOwned++;
         const displayName = capitalizeWords(key.replace("_mythic", "")) + " (Mythic)";
         rows.push({
           name: displayName,
           qty: String(qty),
           lvl: "Mythic",
           effect: mythics[key] || "",
           cls: "mythic"
         });
       }
     }
   }
 }
 
 summary.innerHTML = `<b>Active normal sets:</b> ${active}/15 &nbsp; <b>Owned Mythics:</b> ${myOwned}/26`;
 render();
}

function loadFile(f){
 const r=new FileReader();
 r.onload=e=>parse(e.target.result);
 r.readAsText(f);
}
file.addEventListener("change",e=>{if(e.target.files.length)loadFile(e.target.files[0]);});
drop.addEventListener("dragover",e=>e.preventDefault());
drop.addEventListener("drop",e=>{
 e.preventDefault();
 if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0]);
});
</script></body></html>
